name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    if: ${{ !cancelled() }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            recipe: build
          - name: Lint
            recipe: lint
          - name: Test
            recipe: test
          - name: Runtime
            recipe: runtime-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Run ${{ matrix.recipe }}
        run: just ${{ matrix.recipe }}

  coverage:
    if: ${{ !cancelled() }}
    name: Coverage
    runs-on: ubuntu-latest
    needs:
      - checks
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Generate coverage
        run: just coverage-ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: ./target/llvm-cov/lcov.info

  publish-runtime:
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.checks.result == 'success' && needs.coverage.result == 'success' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    name: Publish Runtime Image
    runs-on: ubuntu-latest
    needs:
      - checks
      - coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish runtime image
        run: just docker-push-runtime docker.io/v4lproik/github-actionspec-rs:latest
