name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    if: ${{ !cancelled() }}
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      core: ${{ steps.manual.outputs.core || steps.filter.outputs.core }}
      infra: ${{ steps.manual.outputs.infra || steps.filter.outputs.infra }}
      docs: ${{ steps.manual.outputs.docs || steps.filter.outputs.docs }}
      run_ci: ${{ steps.manual.outputs.run_ci || (steps.filter.outputs.core == 'true' || steps.filter.outputs.infra == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Force CI for manual dispatch
        id: manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          {
            echo "core=false"
            echo "infra=false"
            echo "docs=false"
            echo "run_ci=true"
          } >> "${GITHUB_OUTPUT}"
      - name: Classify changed files
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3.0.2
        with:
          base: ${{ github.ref }}
          filters: .github/filters/changes.yml

      - name: Summarize detected changes
        run: |
          cat <<'EOF' >> "${GITHUB_STEP_SUMMARY}"
          ## Change Detection
          - Event: `${{ github.event_name }}`
          - Core: `${{ steps.manual.outputs.core || steps.filter.outputs.core || 'false' }}`
          - Infra: `${{ steps.manual.outputs.infra || steps.filter.outputs.infra || 'false' }}`
          - Docs: `${{ steps.manual.outputs.docs || steps.filter.outputs.docs || 'false' }}`
          - Run CI: `${{ steps.manual.outputs.run_ci || (steps.filter.outputs.core == 'true' || steps.filter.outputs.infra == 'true') }}`
          EOF

  checks:
    if: ${{ !cancelled() && needs.detect-changes.outputs.run_ci == 'true' }}
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build
            recipe: build
          - name: Lint
            recipe: lint
          - name: Test
            recipe: test
          - name: Runtime
            recipe: runtime-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Run ${{ matrix.recipe }}
        run: just ${{ matrix.recipe }}

  action-smoke:
    if: ${{ !cancelled() && needs.detect-changes.outputs.run_ci == 'true' }}
    name: Local Action Smoke
    runs-on: ubuntu-latest
    needs:
      - detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate passing fixture directory
        uses: ./
        with:
          repo: tests/fixtures/repos/factmachine-monorepo
          workflow: build-infrastructure.yml
          actual: tests/fixtures/build-infrastructure/passing
      - name: Validate passing fixture list
        uses: ./
        with:
          repo: tests/fixtures/repos/factmachine-monorepo
          workflow: build-infrastructure.yml
          actual: |
            tests/fixtures/build-infrastructure/staging-success.json
            tests/fixtures/build-infrastructure/staging-tests-failed-no-promote.json
      - name: Reject missing validator runtime tag
        id: missing-validator-tag
        continue-on-error: true
        uses: ./
        with:
          repo: tests/fixtures/repos/factmachine-monorepo
          workflow: build-infrastructure.yml
          actual: tests/fixtures/build-infrastructure/staging-missing-validator-tag.json
      - name: Reject inconsistent test safeguard
        id: inconsistent-safeguard
        continue-on-error: true
        uses: ./
        with:
          repo: tests/fixtures/repos/factmachine-monorepo
          workflow: build-infrastructure.yml
          actual: tests/fixtures/build-infrastructure/staging-tests-passed-but-failed-jobs.json
      - name: Validate expected smoke outcomes
        if: ${{ always() }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.missing-validator-tag.outcome }}" != "failure" ]]; then
            echo "::error::The missing validator runtime tag fixture should fail validation."
            exit 1
          fi

          if [[ "${{ steps.inconsistent-safeguard.outcome }}" != "failure" ]]; then
            echo "::error::The inconsistent test safeguard fixture should fail validation."
            exit 1
          fi

  coverage:
    if: ${{ !cancelled() && needs.detect-changes.outputs.run_ci == 'true' }}
    name: Coverage
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - checks
      - action-smoke
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Generate coverage
        run: just coverage-ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          fail_ci_if_error: true
          files: ./target/llvm-cov/lcov.info

  publish-runtime:
    if: ${{ !cancelled() && needs.detect-changes.outputs.run_ci == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.checks.result == 'success' && needs.action-smoke.result == 'success' && needs.coverage.result == 'success' }}
    name: Publish Runtime Image
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - checks
      - action-smoke
      - coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Check publish credentials
        id: publish-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Log in to Docker Hub
        if: ${{ steps.publish-check.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish runtime image
        if: ${{ steps.publish-check.outputs.enabled == 'true' }}
        run: just docker-push-runtime docker.io/v4lproik/github-actionspec-rs:latest
      - name: Skip publish when credentials are missing
        if: ${{ steps.publish-check.outputs.enabled != 'true' }}
        run: echo "Docker Hub credentials are not configured; skipping runtime image publish."
