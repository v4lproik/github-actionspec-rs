name: github-actionspec
description: Capture or validate normalized GitHub Actions workflow payloads against repository-owned CUE declarations.
outputs:
  capture-path:
    description: Path to the normalized workflow payload written by the action in capture mode.
  report-path:
    description: Path to the JSON validation report written by the action.
  dashboard-path:
    description: Path to the markdown dashboard written by the action.
inputs:
  mode:
    description: Action mode. Supported values are `capture` and `validate-repo`.
    required: false
    default: validate-repo
  repo:
    description: Path to the target repository containing .github/actionspec declarations.
    required: false
    default: .
  workflow:
    description: Workflow file name to capture or validate. Optional for validate-repo when the provided payloads all belong to the same workflow.
    required: false
    default: ""
  ref-name:
    description: Optional workflow ref recorded in capture mode.
    required: false
    default: ""
  capture-job-files:
    description: Path to one job fragment JSON file, a directory of fragment JSON files, a glob pattern, or a newline-separated list of those inputs for capture mode.
    required: false
    default: .github/actionspec-fragments
  capture-inputs:
    description: Optional newline-separated list of KEY=VALUE workflow inputs recorded in capture mode.
    required: false
    default: ""
  capture-file:
    description: Path where the action should write the normalized workflow payload in capture mode.
    required: false
    default: /github/runner_temp/github-actionspec-capture/current/workflow-run.json
  actual:
    description: Path to a normalized workflow run JSON payload, a directory of JSON payloads, a glob pattern, or a newline-separated list of payload paths or glob patterns.
    required: false
    default: .github/actionspec-artifacts
  declarations-dir:
    description: Path to the declarations directory inside the target repository.
    required: false
    default: .github/actionspec
  report-file:
    description: Path where the action should write the JSON validation report.
    required: false
    default: /github/runner_temp/github-actionspec-dashboard/current/validation-report.json
  baseline-report:
    description: Optional path to a previous JSON validation report used to render dashboard diffs.
    required: false
    default: ""
  dashboard-file:
    description: Path where the action should write the markdown matrix dashboard. When omitted, the action writes `dashboard.md` next to `report-file`.
    required: false
    default: ""
  dashboard-output-keys:
    description: Optional newline-separated list of job output keys to render in the dashboard and PR comment.
    required: false
    default: ""
  write-summary:
    description: Whether to append the rendered dashboard to the GitHub Actions job summary.
    required: false
    default: "true"
  comment-pr:
    description: Whether to upsert the rendered dashboard as a PR comment when the workflow runs on a pull request.
    required: false
    default: "false"
  comment-title:
    description: Title used for the PR comment when comment-pr is enabled.
    required: false
    default: Workflow Matrix Dashboard
  comment-tag:
    description: Stable tag used to find and update the existing PR matrix comment.
    required: false
    default: github-actionspec-matrix
  github-token:
    description: GitHub token used for PR comment upserts when comment-pr is enabled.
    required: false
    default: ""
runs:
  using: docker
  image: Dockerfile
  entrypoint: /usr/local/bin/github-actionspec-action
  args:
    - ${{ inputs.mode }}
